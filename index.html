function sysAlert(msg, title='Notification') {
    document.getElementById('alertTitle').innerText = title;

}

let confirmCallback = null;
function sysConfirm(msg, cb) {
    document.getElementById('confirmMsg').innerText = msg;
    document.getElementById('sysConfirmModal').classList.remove('hidden');
    confirmCallback = cb;
}
function resolveConfirm(res) {
    document.getElementById('sysConfirmModal').classList.add('hidden');
    if(res && confirmCallback) confirmCallback();
    confirmCallback = null;
}

        document.body.appendChild(loader);

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${this.BIN_ID}/latest`, {
                headers: {
                    "X-Master-Key": this.API_KEY,

        return this.data[key] || null;

        this.data[key] = val;
        this.sync();
    },

    async sync() {
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${this.BIN_ID}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": this.API_KEY,
                    "X-Access-Key": this.ACCESS_KEY
                },
                body: JSON.stringify(this.data)
            });

function fmtDate(dStr) {

    const str = String(dStr);
    const parts = str.split('-');
    if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
    return str;
}

        dashboard:'navJournal',
        entrySection:'navEntry',
        ledgerSection:'navLedger',
        trialSection:'navReports',
        docSection:'navDocs',
        adminSection:'navAdmin'

function switchSession(v) { 
    curSess = v; 
    CLOUD.set('njs_active_sess', v);

    updateDrops();
    
    if(!document.getElementById('dashboard').classList.contains('hidden')) refresh();
    if(!document.getElementById('ledgerSection').classList.contains('hidden')) renderLedger();

}

function promptNewSession() {
    const s = prompt("Enter Name for the new Session (e.g. 2026-27 or Annual Event):");
    if(s && s.trim() !== '') {
        const clean = s.trim();
        if(!config.sessions.includes(clean)) {
            config.sessions.push(clean);
            CLOUD.set('njs_cfg_v16', JSON.stringify(config));
        }
        switchSession(clean);
    }
}

function loadRecordsForSession() {
    records = JSON.parse(CLOUD.get('njs_db_' + curSess) || "[]");
    refresh();
}

function refresh() {
    records.sort((a,b) => {
        let da = new Date(a.date).getTime() || 0;
        let db = new Date(b.date).getTime() || 0;
        return da - db;
    });
    let bal = 0, h = '', totalDr = 0, totalCr = 0;
    const isAdmin = currentUserObj && currentUserObj.role === 'admin';

    records.forEach((r, i) => {
        r.dr = parseFloat(String(r.dr).replace(/[^0-9.-]+/g,"")) || 0;
        r.cr = parseFloat(String(r.cr).replace(/[^0-9.-]+/g,"")) || 0;

        bal = parseFloat((bal + r.dr - r.cr).toFixed(2));
        totalDr = parseFloat((totalDr + r.dr).toFixed(2));
        totalCr = parseFloat((totalCr + r.cr).toFixed(2));
        
        let balColor = bal >= 0 ? 'var(--success)' : 'var(--danger)';
        let balStr = bal >= 0 ? `₹${bal}` : `-₹${Math.abs(bal)}`;

        h += `<tr><td>${fmtDate(r.date)}</td><td>${r.vou||'-'}</td><td>${r.mem}</td><td>${r.cat}</td>
        <td style="color:var(--success); font-weight:600">₹${r.dr}</td><td style="color:var(--danger); font-weight:600">₹${r.cr}</td>
        <td style="color:${balColor}; font-weight:700">${balStr}</td>
        <td class="no-print" style="white-space:nowrap;">
            <button onclick="printV(${i})" class="btn btn-ghost" style="padding:4px 8px; font-size:11px;" title="Print">⎙</button>
            <button onclick="editRec(${i})" class="btn btn-warn ${isAdmin?'':'hidden'}" style="padding:4px 8px; font-size:11px;" title="Edit">✎</button>
            <button onclick="delRec(${i})" class="btn btn-danger ${isAdmin?'':'hidden'}" style="padding:4px 8px; font-size:11px;" title="Delete">×</button>
        </td></tr>`;
    });
    
    h += `<tr style="background:#f1f5f9; font-weight:700;">
        <td colspan="4" style="text-align:right; color:var(--primary);">TOTAL (SESSION):</td>
        <td style="color:var(--success);">₹${totalDr}</td>
        <td style="color:var(--danger);">₹${totalCr}</td>
        <td style="color:${bal >= 0 ? 'var(--success)' : 'var(--danger)'};">₹${bal >= 0 ? bal : '-'+Math.abs(bal)}</td>
        <td class="no-print" style="${!isAdmin ? 'display:none;' : ''}"></td>
    </tr>`;

    document.getElementById('txnBody').innerHTML = h;
    CLOUD.set('njs_db_' + curSess, JSON.stringify(records));
}

function genAI() {
    const t = document.getElementById('tType').value, m = document.getElementById('tMem').value, c = document.getElementById('tCat').value, a = document.getElementById('tAmt').value||0, v = document.getElementById('tVou').value||'N/A';
    const action = t==='dr' ? 'received from' : 'paid to';
    const doc = t==='dr' ? 'Money Receipt' : 'Payment Voucher';
    document.getElementById('tBeing').value = `Being the amount ${action} ${m} on account of ${c} vide ${doc} No. ${v} amounting to Rs. ${a}/-.`;
}

function saveTxn() {
    const idx = parseInt(document.getElementById('editIdx').value);
    const data = {
        date: document.getElementById('tDate').value, vou: document.getElementById('tVou').value, cat: document.getElementById('tCat').value, mem: document.getElementById('tMem').value,
        dr: document.getElementById('tType').value === 'dr' ? parseFloat(document.getElementById('tAmt').value)||0 : 0,
        cr: document.getElementById('tType').value === 'cr' ? parseFloat(document.getElementById('tAmt').value)||0 : 0,
        being: document.getElementById('tBeing').value
    };
    if(idx === -1) records.push(data); else records[idx] = data;
    refresh(); showAppSection('dashboard');
}

function editRec(i) {
    const r = records[i]; showAppSection('entrySection');

    document.getElementById('tVou').value = r.vou; document.getElementById('tCat').value = r.cat; document.getElementById('tMem').value = r.mem;
    document.getElementById('tAmt').value = r.dr || r.cr; document.getElementById('tType').value = r.dr > 0 ? 'dr' : 'cr';
    document.getElementById('tBeing').value = r.being;
}

function renderLedger() {
    const f = document.getElementById('ledgerFilter').value;
    const items = records.filter(r => r.cat === f);
    let h = `<div class="card" style="border-left:5px solid var(--primary)"><h4>${f} Ledger</h4><table><thead><tr><th>Date</th><th>Voucher</th><th>Part</th><th>Dr</th><th>Cr</th><th>Balance</th></tr></thead><tbody>`;
    if(items.length > 0) {
        let catBal = 0;
        items.forEach(r => {
            catBal = parseFloat((catBal + (parseFloat(r.dr)||0) - (parseFloat(r.cr)||0)).toFixed(2));
            let balStr = catBal >= 0 ? `₹${catBal}` : `-₹${Math.abs(catBal)}`;
            h += `<tr><td>${fmtDate(r.date)}</td><td>${r.vou || '-'}</td><td>${r.mem}</td><td>₹${r.dr}</td><td>₹${r.cr}</td><td style="font-weight:600; color:${catBal >= 0 ? 'var(--success)' : 'var(--danger)'}">${balStr}</td></tr>`;
        });
    } else {
        h += `<tr><td colspan="6" style="text-align:center; color:var(--text-muted)">No transactions recorded in this head.</td></tr>`;
    }
    document.getElementById('ledgerOutput').innerHTML = h + `</tbody></table></div>`;
}

    let h = '';

        const items = records.filter(r => r.cat === c);

            h += `<div class="card"><h4>${c}</h4><table><thead><tr><th>Date</th><th>Voucher</th><th>Part</th><th>Dr</th><th>Cr</th><th>Balance</th></tr></thead><tbody>`;
            let catBal = 0;
            items.forEach(r => {
                catBal = parseFloat((catBal + (parseFloat(r.dr)||0) - (parseFloat(r.cr)||0)).toFixed(2));
                let balStr = catBal >= 0 ? `₹${catBal}` : `-₹${Math.abs(catBal)}`;
                h += `<tr><td>${fmtDate(r.date)}</td><td>${r.vou || '-'}</td><td>${r.mem}</td><td>₹${r.dr}</td><td>₹${r.cr}</td><td style="font-weight:600; color:${catBal >= 0 ? 'var(--success)' : 'var(--danger)'}">${balStr}</td></tr>`;
            });
            h += `</tbody></table></div>`;
        }
    });
    if (h === '') h = `<div class="card" style="text-align:center; color:var(--text-muted)">No transactions found in any active ledger.</div>`;
    document.getElementById('ledgerOutput').innerHTML = h;
}

    let h = `<table id="tblTrial"><thead><tr><th>Account Head</th><th>Dr (Inflow)</th><th>Cr (Outflow)</th></tr></thead><tbody>`;
    for(let k in m) { h += `<tr><td>${k}</td><td>₹${m[k].dr.toFixed(2)}</td><td>₹${m[k].cr.toFixed(2)}</td></tr>`; td+=m[k].dr; tc+=m[k].cr; }
    h += `<tr style="background:#fef2f2; font-weight:700; color:var(--danger);"><td>CASH IN HAND (BALANCE)</td><td>-</td><td>₹${(td-tc).toFixed(2)}</td></tr><tr style="background:#ecfdf5; font-weight:700;"><td>GRAND TOTAL</td><td>₹${td.toFixed(2)}</td><td>₹${td.toFixed(2)}</td></tr></tbody></table>`;
    document.getElementById('trialOutput').innerHTML = h;
}

function renderSummary() {
    let rm = {}, pm = {}, td=0, tc=0;
    records.forEach(r => { if(r.dr>0){ rm[r.cat]=(rm[r.cat]||0)+r.dr; td+=r.dr; } else { pm[r.cat]=(pm[r.cat]||0)+r.cr; tc+=r.cr; } });
    let h = `<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:15px;"><div><h4 style="color:var(--success)">TOTAL RECEIPTS</h4><table>`;
    for(let c in rm) h += `<tr><td>${c}</td><td>₹${rm[c].toFixed(2)}</td></tr>`;
    h += `<tr style="font-weight:700"><td>Total Inflow</td><td>₹${td.toFixed(2)}</td></tr></table></div><div><h4 style="color:var(--danger)">TOTAL PAYMENTS</h4><table>`;
    for(let c in pm) h += `<tr><td>${c}</td><td>₹${pm[c].toFixed(2)}</td></tr>`;
    h += `<tr style="color:var(--danger)"><td>CASH IN HAND</td><td>₹${(td-tc).toFixed(2)}</td></tr><tr style="font-weight:700"><td>Total Outflow</td><td>₹${td.toFixed(2)}</td></tr></table></div></div>`;
    document.getElementById('summaryOutput').innerHTML = h;
}

function switchAdminTab(id, el) {
    document.querySelectorAll('.admin-panel').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.admin-tab').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
}

function loadAdmin() {
    document.getElementById('admClub').value = config.club;
    document.getElementById('admPassA').value = config.passA;
    document.getElementById('admSigA').value = config.sigA;
    document.getElementById('admSigT').value = config.sigT;
    document.getElementById('admSigS').value = config.sigS;
    
    document.getElementById('lhClubName').innerText = config.club;
    document.getElementById('lhSigAuth').innerText = config.sigA;

    document.getElementById('admCatList').innerHTML = config.cats.map((c,i)=>`<span class="badge">${c} <button onclick="remCfg('cats',${i})" style="border:0; background:transparent; color:red; font-weight:bold; cursor:pointer;">×</button></span>`).join(' ');
    renderAdminUsers();
    renderAdminDocs();
}

function saveAdminGeneral() {
    config.club = document.getElementById('admClub').value;
    config.passA = document.getElementById('admPassA').value;
    config.sigA = document.getElementById('admSigA').value; 
    config.sigT = document.getElementById('admSigT').value; 
    config.sigS = document.getElementById('admSigS').value;
    CLOUD.set('njs_cfg_v16', JSON.stringify(config)); 
    document.getElementById('dispClub').innerText = config.club;
    sysAlert("General Configuration Synced to Cloud Successfully!"); 
}

function backupData() {
    const data = { config, documents, db: {} };
    config.sessions.forEach(s => data.db[s] = JSON.parse(CLOUD.get('njs_db_'+s) || '[]'));
    const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'NJS_Cloud_Backup.json'; a.click();
}

function restoreData(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const data = JSON.parse(ev.target.result);
        
        CLOUD.data['njs_cfg_v16'] = JSON.stringify(data.config);
        CLOUD.data['njs_docs_v16'] = JSON.stringify(data.documents);
        for(let s in data.db) CLOUD.data['njs_db_'+s] = JSON.stringify(data.db[s]);
        
        CLOUD.sync().then(() => {
            sysAlert("Cloud Restore complete. Please refresh to load data.");
        });
    };
    reader.readAsText(e.target.files[0]);
}

function addCfg(k, id) { 
    const v = document.getElementById(id).value.trim(); 
    if(v && !config[k].includes(v)){ 
        config[k].push(v); document.getElementById(id).value=""; 
        loadAdmin(); updateDrops(); 
        CLOUD.set('njs_cfg_v16', JSON.stringify(config));
    }
}
function remCfg(k, i) { 
    sysConfirm("Delete this configuration?", () => {
        config[k].splice(i,1); 
        CLOUD.set('njs_cfg_v16', JSON.stringify(config));
        loadAdmin(); updateDrops(); 
    });
}

function renderAdminUsers() {
    let h = '';
    config.users.forEach((u, i) => {
        h += `<tr>
            <td>${u.name}</td><td><code style="background:#e2e8f0; padding:2px 6px; border-radius:4px;">${u.key}</code></td>
            <td>${u.validTill}</td>
            <td>
                <button onclick="editUser(${i})" class="btn btn-warn" style="padding:4px 8px; font-size:11px;">✎</button>
                <button onclick="delUser(${i})" class="btn btn-danger" style="padding:4px 8px; font-size:11px;">×</button>
            </td>
        </tr>`;
    });
    document.getElementById('userListBody').innerHTML = h;
}

function openUserForm() {
    document.getElementById('userEditForm').classList.remove('hidden');
    document.getElementById('editUserIdx').value = "-1";
    document.getElementById('uName').value = "";
    document.getElementById('uKey').value = Math.random().toString(36).substring(2,8).toUpperCase();
    document.getElementById('uValid').value = "12/2026";
    document.getElementById('userFormTitle').innerText = "Add New Member";
}

function editUser(i) {
    const u = config.users[i];
    document.getElementById('userEditForm').classList.remove('hidden');
    document.getElementById('editUserIdx').value = i;
    document.getElementById('uName').value = u.name;
    document.getElementById('uKey').value = u.key;
    document.getElementById('uValid').value = u.validTill;
    document.getElementById('userFormTitle').innerText = "Edit Member Profile";
}

function saveUser() {
    const idx = parseInt(document.getElementById('editUserIdx').value);
    const uName = document.getElementById('uName').value.trim();
    if(!uName) return sysAlert("Member name is required.");
    
    const obj = {
        name: uName,
        key: document.getElementById('uKey').value.toUpperCase(),
        validTill: document.getElementById('uValid').value,
        role: 'member'
    };
    
    if(idx === -1) config.users.push(obj);
    else config.users[idx] = obj;
    
    CLOUD.set('njs_cfg_v16', JSON.stringify(config));
    document.getElementById('userEditForm').classList.add('hidden');
    renderAdminUsers();
    updateDrops();
}

function delUser(i) {
    sysConfirm(`Delete member ${config.users[i].name}?`, () => {
        config.users.splice(i,1);
        CLOUD.set('njs_cfg_v16', JSON.stringify(config));
        renderAdminUsers();
    });
}

function uploadDoc() {
    const sess = document.getElementById('upDocSess').value;
    const name = document.getElementById('upDocName').value.trim();
    const fileInp = document.getElementById('upDocFile');
    
    if(!name || !fileInp.files.length) return sysAlert("Please provide document name and select a PDF file.");
    
    const file = fileInp.files[0];
    if(file.size > 2 * 1024 * 1024) return sysAlert("File is too large. Cloud limit is 2MB per file.");

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            documents.push({ id: Date.now(), sess: sess, name: name, dataUrl: e.target.result });
            CLOUD.set('njs_docs_v16', JSON.stringify(documents));
            sysAlert("Document successfully uploaded to Cloud and bound to session " + sess);
            document.getElementById('upDocName').value = "";
            fileInp.value = "";
            renderAdminDocs();
        } catch(err) {
            sysAlert("Storage Limit Reached. Cannot save large file.", "Error");
        }
    };
    reader.readAsDataURL(file);
}

function renderAdminDocs() {
    let h = '';
    documents.forEach((d, i) => {
        h += `<tr><td>${d.sess}</td><td>${d.name}</td><td><button onclick="delDoc(${i})" class="btn btn-danger" style="padding:4px 8px; font-size:11px;">🗑 Delete</button></td></tr>`;
    });
    document.getElementById('upDocList').innerHTML = h;
}

function delDoc(i) {
    sysConfirm("Delete this document from Cloud?", () => {
        documents.splice(i,1);
        CLOUD.set('njs_docs_v16', JSON.stringify(documents));
        renderAdminDocs();
    });
}

function renderDocGallery() {
    const filter = document.getElementById('docViewSess').value;
    let viewDocs = documents;
    if(filter !== 'ALL') viewDocs = documents.filter(d => d.sess === filter);
    
    let h = '';
    if(viewDocs.length === 0) {
        h = `<div style="grid-column: 1/-1; text-align:center; padding: 30px; color: var(--text-muted);">No documents available for the selected criteria.</div>`;
    } else {
        viewDocs.forEach(d => {
            h += `<div class="doc-card">
                <div style="font-size: 11px; font-weight: 700; color: var(--blue);">${d.sess} Session</div>
                <div style="font-weight: 600;">${d.name}</div>
                <a href="${d.dataUrl}" download="${d.name.replace(/\s+/g,'_')}.pdf" target="_blank" class="btn btn-ghost" style="text-decoration:none; margin-top: auto;">👁 View / Download</a>
            </div>`;
        });
    }
    document.getElementById('docGallery').innerHTML = h;
}

function importExcel(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            data.forEach(x => {
                let finalDate = new Date().toISOString().split('T')[0];
                if (x.Date) {
                    let d = String(x.Date).trim();
                    if (d.includes('/')) {
                        let p = d.split('/');
                        if(p.length === 3) finalDate = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
                    } else if (d.includes('-')) {
                        finalDate = d;
                    } else if (!isNaN(d)) {
                        let jsDate = new Date(Math.round((Number(d) - 25569) * 86400 * 1000));
                        if(!isNaN(jsDate)) finalDate = jsDate.toISOString().split('T')[0];
                    }
                }

                let parsedCat = String(x.Category || x.Head || "Miscellaneous").trim();
                if(parsedCat && !config.cats.includes(parsedCat)) {
                    config.cats.push(parsedCat);
                    CLOUD.data['njs_cfg_v16'] = JSON.stringify(config);
                }

                const cleanAmt = (val) => {
                    if(!val) return 0;
                    let num = parseFloat(String(val).replace(/[^0-9.-]+/g,""));
                    return isNaN(num) ? 0 : num;
                };

                records.push({
                    date: finalDate,
                    vou: String(x.Voucher || x['Voucher#'] || ""),
                    cat: parsedCat,
                    mem: x.Particulars || x.Remark || "General",
                    dr: cleanAmt(x['In (+)'] || x.In || x['Cash In (Dr)'] || 0),
                    cr: cleanAmt(x['Out (-)'] || x.Out || x['Cash Out (Cr)'] || 0),
                    being: x.Narration || x.Being || ""
                });
            });
            refresh(); 
            sysAlert("Batch Excel Import Synced to Cloud Successfully!");
        } catch(err) {
            console.error(err);
            sysAlert("Error importing file. Please verify format.", "Import Failed");
        }
        e.target.value = ''; 
    };
    reader.readAsArrayBuffer(file);
}

function exportTable(id, name) {
    const table = document.getElementById(id);
    const ws = XLSX.utils.table_to_sheet(table);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
    XLSX.writeFile(wb, `${name}_${curSess}.xlsx`);
}
