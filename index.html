// --- FORCE CLEAN BREAK ON REFRESH / INITIALIZATION ---
window.addEventListener('DOMContentLoaded', () => {
    // Force clear sticky browser form caches
    const inputs = document.querySelectorAll('input, select, textarea');
    inputs.forEach(input => {
        if(input.type !== 'button' && input.type !== 'submit') {
            input.value = '';
        }
    });
    // Clear standard browser tab session items to prevent data shadowing
    sessionStorage.clear();
});

// --- Custom Modal System ---
function sysAlert(msg, title='Notification') {
    document.getElementById('alertTitle').innerText = title;
    document.getElementById('alertMsg').innerText = msg;
    document.getElementById('sysAlertModal').classList.remove('hidden');
}

let confirmCallback = null;
function sysConfirm(msg, cb) {
    document.getElementById('confirmMsg').innerText = msg;
    document.getElementById('sysConfirmModal').classList.remove('hidden');
    confirmCallback = cb;
}
function resolveConfirm(res) {
    document.getElementById('sysConfirmModal').classList.add('hidden');
    if(res && confirmCallback) confirmCallback();
    confirmCallback = null;
}

    BIN_ID: "6a2ee233da38895dfebf8333",
    data: {},

    async init() {
        const loader = document.createElement('div');
        loader.id = "cloudLoaderOverlay";
        loader.innerHTML = '<div style="position:fixed;inset:0;background:white;display:flex;justify-content:center;align-items:center;z-index:99999;font-weight:600;color:#881337;">Connecting Cloud Ledger...</div>';
        document.body.appendChild(loader);

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${this.BIN_ID}/latest`, {
                headers: { "X-Master-Key": this.API_KEY, "X-Access-Key": this.ACCESS_KEY },
                cache: "no-store" // Force browser to bypass historical data cache
            });
            const json = await res.json();
            this.data = json.record || {};
        } catch(e) {
            sysAlert("Cloud sync server connection failed.");
        }
        const activeLoader = document.getElementById("cloudLoaderOverlay");
        if(activeLoader) document.body.removeChild(activeLoader);
    },

    get(key) { return this.data[key] || null; },
    set(key, val) { this.data[key] = val; this.sync(); },

    async sync() {
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${this.BIN_ID}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": this.API_KEY,
                    "X-Access-Key": this.ACCESS_KEY
                },
                body: JSON.stringify(this.data)
            });
        } catch(e) {
            console.error("Cloud storage sync failure:", e);
        }
    }
};

function fmtDate(dStr) {
    if(!dStr) return '-';
    const parts = String(dStr).split('-');
    if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
    return dStr;
}

    } else {
        document.querySelectorAll('.admin-only').forEach(el => el.classList.add('hidden'));
    }

    showAppSection('dashboard');

function restoreUIAfterRefresh() {
    const role = sessionStorage.getItem('activeRole');
    if (role === 'admin') {
        currentUserObj = { name: 'Administrator', role: 'admin' };
        enterApp();
    } else {
        const key = sessionStorage.getItem('activeUserKey');
        const matched = config.users.find(u => u.key === key);
        if (matched) {
            currentUserObj = matched;
            enterApp();
        } else {
            logoutSession();
        }
    }
}

function buildSessionSelectors() {
    const s1 = document.getElementById('sessionSelect');
    const s2 = document.getElementById('upDocSess');
    const s3 = document.getElementById('docViewSess');

    [s1, s2, s3].forEach(sel => {
        if(!sel) return;
        sel.innerHTML = '';
        config.sessions.forEach(sess => {
            let opt = document.createElement('option');
            opt.value = sess; opt.innerText = `Session ${sess}`;
            sel.appendChild(opt);
        });
    });
    s1.value = curSess;
    s3.value = curSess;
}

function switchSession(val) {
    curSess = val;
    CLOUD.set('njs_active_sess', val);
    records = JSON.parse(CLOUD.get('njs_txns_' + curSess) || '[]');
    refresh();
}

function promptNewSession() {
    let s = prompt("Enter new financial session format (e.g. 2025-26):");
    if (s && s.trim()) {
        s = s.trim();
        if (!config.sessions.includes(s)) {
            config.sessions.push(s);
            CLOUD.set('njs_cfg_v16', JSON.stringify(config));
            buildSessionSelectors();
            switchSession(s);
        }
    }
}

    if (id === 'ledgerSection') document.getElementById('navLedger').classList.add('active');
    if (id === 'trialSection') document.getElementById('navReports').classList.add('active');
    if (id === 'docSection') document.getElementById('navDocs').classList.add('active');
    if (id === 'adminSection') document.getElementById('navAdmin').classList.add('active');

    if (id === 'dashboard') refresh();
}

function genAI() {
    const date = fmtDate(document.getElementById('tDate').value);
    const vou = document.getElementById('tVou').value;
    const cat = document.getElementById('tCat').value;
    const mem = document.getElementById('tMem').value;
    const amt = document.getElementById('tAmt').value;
    const type = document.getElementById('tType').value;

    let text = "";
    if (amt && cat) {
        if (type === 'dr') {
            text = `Being amount of ₹${amt} received from ${mem} on account of ${cat} dated ${date || '[Pending]'}. Received against reference voucher #${vou || '[N/A]'}.`;
        } else {
            text = `Being professional payment of ₹${amt} debited/paid out to ${mem} towards ${cat} requirements dated ${date || '[Pending]'}. Handled via voucher #${vou || '[N/A]'}.`;
        }
    }
    document.getElementById('tBeing').value = text;
}

function resetForm() {
    document.getElementById('editIdx').value = "-1";
    document.getElementById('formTitle').innerText = "New Transaction Entry";
    document.getElementById('tDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('tVou').value = "";
    document.getElementById('tAmt').value = "";
    document.getElementById('tBeing').value = "";
    initEntryOptions();
    genAI();
}

function saveTxn() {
    const idx = parseInt(document.getElementById('editIdx').value);
    const date = document.getElementById('tDate').value;
    const vou = document.getElementById('tVou').value.trim();
    const cat = document.getElementById('tCat').value;
    const mem = document.getElementById('tMem').value;
    const amt = parseFloat(document.getElementById('tAmt').value) || 0;
    const type = document.getElementById('tType').value;
    const being = document.getElementById('tBeing').value;

    if (!date || amt <= 0) {
        sysAlert("Please enter a valid date and allocation amount!");
        return;
    }

    const item = {
        date, vou, cat, mem,
        dr: type === 'dr' ? amt : 0,
        cr: type === 'cr' ? amt : 0,
        being
    };

    if (idx === -1) {
        records.push(item);
    } else {
        records[idx] = item;
    }

    CLOUD.set('njs_txns_' + curSess, JSON.stringify(records));
    sysAlert("Transaction successfully captured and saved to cloud!");
    showAppSection('dashboard');
}

function editTxn(idx) {
    const item = records[idx];
    showAppSection('entrySection');
    initEntryOptions();

    document.getElementById('editIdx').value = idx;
    document.getElementById('formTitle').innerText = "Modify Existing Transaction Entry";
    document.getElementById('tDate').value = item.date;
    document.getElementById('tVou').value = item.vou;
    document.getElementById('tCat').value = item.cat;
    document.getElementById('tMem').value = item.mem;
    document.getElementById('tAmt').value = item.dr > 0 ? item.dr : item.cr;
    document.getElementById('tType').value = item.dr > 0 ? 'dr' : 'cr';
    document.getElementById('tBeing').value = item.being;
}

function deleteTxn(idx) {
    sysConfirm("Are you completely sure you want to permanently erase this ledger line transaction?", () => {
        records.splice(idx, 1);
        CLOUD.set('njs_txns_' + curSess, JSON.stringify(records));
        refresh();
    });
}

function renderJournal() {
    const tbody = document.getElementById('txnBody');
    tbody.innerHTML = '';
    
    // Process running balance chronologically
    let running = 0;
    records.sort((a,b) => new Date(a.date) - new Date(b.date));

    records.forEach((r, idx) => {
        running += (r.dr - r.cr);
        let tr = document.createElement('tr');
        
        let actionCell = currentUserObj.role === 'admin' 
            ? `<td class="no-print"><button onclick="editTxn(${idx})" class="btn btn-ghost" style="padding:4px 8px; font-size:11px;">✏️</button> <button onclick="deleteTxn(${idx})" class="btn btn-danger" style="padding:4px 8px; font-size:11px;">🗑</button></td>`
            : `<td class="no-print text-muted">Read-only</td>`;

        tr.innerHTML = `
            <td><b>${fmtDate(r.date)}</b></td>
            <td><code style="color:var(--accent); font-weight:700;">${r.vou || '-'}</code></td>
            <td><div><b>${r.mem}</b></div><div style="font-size:11px; color:var(--text-muted); margin-top:2px;">${r.being}</div></td>
            <td><span class="badge">${r.cat}</span></td>
            <td style="color:var(--success); font-weight:600;">${r.dr > 0 ? '₹'+r.dr.toFixed(2) : '-'}</td>
            <td style="color:var(--danger); font-weight:600;">${r.cr > 0 ? '₹'+r.cr.toFixed(2) : '-'}</td>
            <td style="font-weight:700; color:${running >= 0 ? 'var(--text-main)': 'var(--danger)'}">₹${running.toFixed(2)}</td>
            ${actionCell}
        `;
        tbody.appendChild(tr);
    });

    if(records.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:30px; color:var(--text-muted);">No records found under Session ${curSess}</td></tr>`;
    }
}

function renderLedger() {
    const filter = document.getElementById('ledgerFilter');
    filter.innerHTML = '';
    config.cats.forEach(c => {
        let o = document.createElement('option'); o.value = c; o.innerText = c;
        filter.appendChild(o);
    });

    const targetHead = filter.value;
    const out = document.getElementById('ledgerOutput');
    if(!targetHead) {
        out.innerHTML = '<p style="color:var(--text-muted)">Create financial categories first.</p>';
        return;
    }

    let filtered = records.filter(r => r.cat === targetHead);
    out.innerHTML = buildSingleLedgerHTML(targetHead, filtered);
}

function renderAllLedgers() {
    const out = document.getElementById('ledgerOutput');
    let html = "";
    config.cats.forEach(cat => {
        let matches = records.filter(r => r.cat === cat);
        if(matches.length > 0) {
            html += buildSingleLedgerHTML(cat, matches) + "<div style='margin-bottom:40px;'></div>";
        }
    });
    out.innerHTML = html || '<p style="color:var(--text-muted)">No computational data active matching transactional categories.</p>';
}

function buildSingleLedgerHTML(title, list) {
    let run = 0;
    let rows = list.map(r => {
        run += (r.dr - r.cr);
        return `<tr>
            <td>${fmtDate(r.date)}</td>
            <td>${r.vou || '-'}</td>
            <td>${r.mem} <small style="display:block; color:var(--text-muted);">${r.being}</small></td>
            <td style="color:var(--success)">${r.dr > 0 ? '₹'+r.dr.toFixed(2) : '-'}</td>
            <td style="color:var(--danger)">${r.cr > 0 ? '₹'+r.cr.toFixed(2) : '-'}</td>
            <td><b>₹${run.toFixed(2)}</b></td>
        </tr>`;
    }).join('');

    return `
        <div style="border: 1px solid var(--border); border-radius:8px; padding:15px; background:white;">
            <h4 style="margin-top:0; color:var(--accent); border-bottom:1px solid var(--border); padding-bottom:5px;">📂 HEAD: ${title.toUpperCase()}</h4>
            <div class="table-container">
                <table>
                    <thead><tr><th>Date</th><th>Voucher</th><th>Particulars</th><th>Debit (In)</th><th>Credit (Out)</th><th>Running Cumulative</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="6" style="text-align:center; color:var(--text-muted);">No entries booked.</td></tr>'}</tbody>
                </table>
            </div>
        </div>
    `;
}

function renderTrial() {
    let summary = {};
    config.cats.forEach(c => summary[c] = { dr: 0, cr: 0 });
    
    records.forEach(r => {
        if(summary[r.cat]) {
            summary[r.cat].dr += r.dr;
            summary[r.cat].cr += r.cr;
        }
    });

    let tDr = 0, tCr = 0;
    let rows = Object.keys(summary).map(head => {
        let net = summary[head].dr - summary[head].cr;
        let dDisp = net > 0 ? '₹'+net.toFixed(2) : '-';
        let cDisp = net < 0 ? '₹'+Math.abs(net).toFixed(2) : '-';
        
        if(net > 0) tDr += net;
        if(net < 0) tCr += Math.abs(net);

        return `<tr><td><b>${head}</b></td><td>${dDisp}</td><td>${cDisp}</td></tr>`;
    }).join('');

    document.getElementById('trialOutput').innerHTML = `
        <div class="table-container">
            <table id="tblTrial">
                <thead><tr><th>Account Classification Head</th><th>Debit Balance (₹)</th><th>Credit Balance (₹)</th></tr></thead>
                <tbody>
                    ${rows}
                    <tr style="background:#f1f5f9; font-weight:800; border-top:2px solid var(--primary);">
                        <td>TOTAL SUMMATION</td><td>₹${tDr.toFixed(2)}</td><td>₹${tCr.toFixed(2)}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    `;
}

function renderSummary() {
    let receipts = 0, payments = 0;
    let breakdownRec = {}, breakdownPay = {};

    records.forEach(r => {
        if(r.dr > 0) {
            receipts += r.dr;
            breakdownRec[r.cat] = (breakdownRec[r.cat] || 0) + r.dr;
        }
        if(r.cr > 0) {
            payments += r.cr;
            breakdownPay[r.cat] = (breakdownPay[r.cat] || 0) + r.cr;
        }
    });

    let recRows = Object.keys(breakdownRec).map(k => `<div><span>• ${k}</span><b>₹${breakdownRec[k].toFixed(2)}</b></div>`).join('');
    let payRows = Object.keys(breakdownPay).map(k => `<div><span>• ${k}</span><b>₹${breakdownPay[k].toFixed(2)}</b></div>`).join('');

    document.getElementById('summaryOutput').innerHTML = `
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div style="background:#f0fdf4; padding:15px; border-radius:8px; border:1px solid #bbf7d0;">
                <h4 style="margin:0; color:var(--success);">📥 TOTAL CASH INFLOWS</h4>
                <div style="font-size:24px; font-weight:800; margin:10px 0; color:var(--success)">₹${receipts.toFixed(2)}</div>
                <div style="font-size:12px; border-top:1px dashed #bbf7d0; padding-top:10px; display:flex; flex-direction:column; gap:5px;">${recRows || 'No inflows recorded'}</div>
            </div>
            <div style="background:#fef2f2; padding:15px; border-radius:8px; border:1px solid #fecaca;">
                <h4 style="margin:0; color:var(--danger);">📤 TOTAL CASH OUTFLOWS</h4>
                <div style="font-size:24px; font-weight:800; margin:10px 0; color:var(--danger)">₹${payments.toFixed(2)}</div>
                <div style="font-size:12px; border-top:1px dashed #fecaca; padding-top:10px; display:flex; flex-direction:column; gap:5px;">${payRows || 'No outflows recorded'}</div>
            </div>
        </div>
    `;
}

function loadAdmin() {
    switchAdminTab('admGeneral', document.querySelector('.admin-tab'));
    document.getElementById('admClub').value = config.club;
    document.getElementById('admPassA').value = config.passA;
    document.getElementById('admSigA').value = config.sigA;
    document.getElementById('admSigT').value = config.sigT;
    document.getElementById('admSigS').value = config.sigS;

    renderAdminCats();
    renderAdminUsers();
    renderAdminDocTable();

    document.getElementById('lhDate').innerText = fmtDate(new Date().toISOString().split('T')[0]);
    document.getElementById('lhSigAuth').innerText = config.sigA || "Authorized Signatory";
    document.getElementById('lhClubName').innerText = config.club;
}

function switchAdminTab(panelId, tabEl) {
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.add('hidden'));
    document.getElementById(panelId).classList.remove('hidden');
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
}

function renderAdminCats() {
    const list = document.getElementById('admCatList');
    list.innerHTML = config.cats.map((c, i) => `
        <div style="display:inline-flex; align-items:center; background:#f1f5f9; border:1px solid var(--border); padding:4px 10px; border-radius:20px; margin:4px;">
            <span style="font-size:12px; font-weight:600; margin-right:8px;">${c}</span>
            <span onclick="removeCfg('cats', ${i})" style="color:var(--danger); cursor:pointer; font-weight:800;">×</span>
        </div>
    `).join('');
}

function addCfg(key, inputId) {
    const inp = document.getElementById(inputId);
    const v = inp.value.trim();
    if(v && !config[key].includes(v)) {
        config[key].push(v);
        inp.value = '';
        renderAdminCats();
    }
}

function removeCfg(key, idx) {
    config[key].splice(idx, 1);
    renderAdminCats();
}

function saveAdminGeneral() {
    config.club = document.getElementById('admClub').value.trim() || config.club;
    config.passA = document.getElementById('admPassA').value.trim() || config.passA;
    config.sigA = document.getElementById('admSigA').value.trim();
    config.sigT = document.getElementById('admSigT').value.trim();
    config.sigS = document.getElementById('admSigS').value.trim();

    CLOUD.set('njs_cfg_v16', JSON.stringify(config));
    sysAlert("System master changes completely committed and saved securely to Cloud.");
    loadAdmin();
}

function renderAdminUsers() {
    const body = document.getElementById('userListBody');
    body.innerHTML = config.users.map((u, i) => `
        <tr>
            <td><b>${u.name}</b></td>
            <td><code>${u.key}</code></td>
            <td>${u.validTill}</td>
            <td><button onclick="deleteUser(${i})" class="btn btn-danger" style="padding:2px 6px; font-size:11px;">Erase</button></td>
        </tr>
    `).join('');
}

function openUserForm() {
    document.getElementById('userEditForm').classList.remove('hidden');
    document.getElementById('uName').value = '';
    document.getElementById('uKey').value = Math.random().toString(36).substring(2,8).toUpperCase();
    document.getElementById('uValid').value = '12/2026';
}

function saveUser() {
    const name = document.getElementById('uName').value.trim();
    const key = document.getElementById('uKey').value.trim().toUpperCase();
    const validTill = document.getElementById('uValid').value.trim();

    if(!name || key.length !== 6) {
        sysAlert("Check credentials. Members require explicit names and a unique 6-digit key.");
        return;
    }

    config.users.push({ name, key, validTill, role: 'member' });
    CLOUD.set('njs_cfg_v16', JSON.stringify(config));
    document.getElementById('userEditForm').classList.add('hidden');
    loadAdmin();
    initLoginSelects();
}

function deleteUser(i) {
    sysConfirm("Permanently kick out and erase authorization parameters for this club member profile?", () => {
        config.users.splice(i, 1);
        CLOUD.set('njs_cfg_v16', JSON.stringify(config));
        loadAdmin();
        initLoginSelects();
    });
}

function uploadDoc() {
    const fEl = document.getElementById('upDocFile');
    const file = fEl.files[0];
    const name = document.getElementById('upDocName').value.trim();
    const sess = document.getElementById('upDocSess').value;

    if(!file || !name) {
        sysAlert("Please specify the document file boundary and report descriptive name.");
        return;
    }

    const r = new FileReader();
    r.onload = function(e) {
        documents.push({
            sess, name,
            base64: e.target.result
        });
        CLOUD.set('njs_docs', JSON.stringify(documents));
        sysAlert("PDF report bounded and compiled with cloud records successfully!");
        fEl.value = '';
        document.getElementById('upDocName').value = '';
        loadAdmin();
    };
    r.readAsDataURL(file);
}

function renderAdminDocTable() {
    const b = document.getElementById('upDocList');
    b.innerHTML = documents.map((d, i) => `
        <tr>
            <td><span class="badge">${d.sess}</span></td>
            <td><b>${d.name}</b></td>
            <td><button onclick="deleteDoc(${i})" class="btn btn-danger" style="padding:2px 6px; font-size:11px;">Erase</button></td>
        </tr>
    `).join('');
}

function deleteDoc(i) {
    sysConfirm("Erase this uploaded PDF binder completely from database systems?", () => {
        documents.splice(i, 1);
        CLOUD.set('njs_docs', JSON.stringify(documents));
        loadAdmin();
    });
}

function renderDocGallery() {
    const s = document.getElementById('docViewSess').value;
    const g = document.getElementById('docGallery');
    g.innerHTML = '';

    let matches = documents.filter(d => d.sess === s);
    matches.forEach(d => {
        let card = document.createElement('div');
        card.className = "doc-card";
        card.innerHTML = `
            <div style="font-size:24px;">📕</div>
            <div style="font-weight:600; font-size:13px; margin-bottom:10px; flex:1;">${d.name}</div>
            <button onclick="openPDF('${d.base64}')" class="btn btn-primary" style="padding:5px; font-size:11px; width:100%;">View Document</button>
        `;
        g.appendChild(card);
    });

    if(matches.length === 0) {
        g.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px; color:var(--text-muted);">No active official files or circular attachments linked to Session ${s}.</div>`;
    }
}

function openPDF(b64) {
    const w = window.open();
    w.document.write(`<iframe src="${b64}" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>`);
}

function backupData() {
    let packageObj = {
        config: config,
        all_txns: {},
        documents: documents
    };
    config.sessions.forEach(s => {
        packageObj.all_txns[s] = CLOUD.get('njs_txns_' + s) || '[]';
    });

    const str = JSON.stringify(packageObj);
    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(str);
    const a = document.createElement('a');
    a.href = dataUri;
    a.download = `NJS_CloudLedger_Backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
}

function restoreData(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const parsed = JSON.parse(evt.target.result);
            if(parsed.config && parsed.documents) {
                config = parsed.config;
                documents = parsed.documents;
                CLOUD.set('njs_cfg_v16', JSON.stringify(config));
                CLOUD.set('njs_docs', JSON.stringify(documents));

                if(parsed.all_txns) {
                    Object.keys(parsed.all_txns).forEach(s => {
                        CLOUD.set('njs_txns_' + s, parsed.all_txns[s]);
                    });
                }
                sysAlert("System database restored from local array map. Core systems resetting now.");
                setTimeout(() => { location.reload(); }, 1500);
            }
        } catch(err) {
            sysAlert("Corrupt file structural configuration map. Restore dropped.");
        }
    };
    reader.readAsText(file);
}

// --- WIPE OUT STATE AND FORCE HARD BREAK ---
function wipeData() {
    sysConfirm("CRITICAL WARNING: This completely wipes out ALL runtime memory data arrays for the active session, logging you out completely. Proceed?", () => {
        // Drop Cloud Keys for current window scope
        CLOUD.set('njs_txns_' + curSess, '[]');
        
        // Instant hard flush context variables
        records = [];
        sessionStorage.clear();
        currentUserObj = null;
        
        sysAlert("Active session memory wiped out. Refreshing platform system structures...");
        
        setTimeout(() => {
            // Force browser window context reload instantly with completely cleared state
            location.replace(location.href.split('#')[0]);
        }, 1200);
    });
}

function importExcel(e) {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, {type: 'array', cellDates: true});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rawRows = XLSX.utils.sheet_to_json(ws, {defval:""});

            rawRows.forEach(x => {
                let finalDate = new Date().toISOString().split('T')[0];
                if (x.Date) {
                    let dObj = new Date(x.Date);
                    if(!isNaN(dObj.getTime())) finalDate = dObj.toISOString().split('T')[0];
                }

                let parsedCat = x.Category || "Miscellaneous";
                if(!config.cats.includes(parsedCat)) {
                    config.cats.push(parsedCat);
                    CLOUD.set('njs_cfg_v16', JSON.stringify(config));
                }

                const cleanAmt = (val) => {
                    if(!val) return 0;
                    let num = parseFloat(String(val).replace(/[^0-9.-]+/g,""));
                    return isNaN(num) ? 0 : num;
                };

                records.push({
                    date: finalDate,
                    vou: String(x.Voucher || x['Voucher#'] || ""),
                    cat: parsedCat,
                    mem: x.Particulars || x.Remark || "General",
                    dr: cleanAmt(x['In (+)'] || x.In || x['Cash In (Dr)'] || 0),
                    cr: cleanAmt(x['Out (-)'] || x.Out || x['Cash Out (Cr)'] || 0),
                    being: x.Narration || x.Being || ""
                });
            });
            CLOUD.set('njs_txns_' + curSess, JSON.stringify(records));
            refresh(); 
            sysAlert("Batch Excel Import Synced to Cloud Successfully!");
        } catch(err) {
            console.error(err);
            sysAlert("Error importing file. Please verify format.", "Import Failed");
        }
        e.target.value = ''; 
    };
    reader.readAsArrayBuffer(file);
}

function exportTable(id, name) {
    const table = document.getElementById(id);
    const ws = XLSX.utils.table_to_sheet(table);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
    XLSX.writeFile(wb, `${name}_Session_${curSess}.xlsx`);
}
